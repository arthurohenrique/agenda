name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run validate

  database-and-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx supabase start
      - run: npx supabase db reset
      - name: Export local Supabase environment
        shell: bash
        run: |
          eval "$(npx supabase status -o env)"
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_APP_URL=http://127.0.0.1:3000" >> "$GITHUB_ENV"
          echo "BOOKING_TOKEN_PEPPER=ci-only-booking-pepper-32-characters" >> "$GITHUB_ENV"
      - run: npm run test:db
      - run: npm run test:integration
        env:
          RUN_DB_TESTS: "1"
      - run: npm run test:e2e
        env:
          RUN_E2E_DB: "1"
